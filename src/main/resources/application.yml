server:
  port: ${TRACKER_PORT:8088}

# JWT — 与 tracker-admin 共享 secret，用于验证 SDK token
jwt:
  secret: ${JWT_SECRET:GateFlowTrackerJwtSecretKey2026!!}

tracker:
  session:
    timeout-minutes: 30
    cleanup-interval-ms: 300000
    heartbeat-interval-ms: 30000
    cache-ttl-minutes: 30
  dedup:
    window-minutes: 5
    two-stage-enabled: true
    local-cache-size: 100000
    local-cache-ttl-seconds: 60
  dlq:
    replay-interval-ms: 60000
    replay-initial-delay-ms: 30000
    batch-size: 100
    max-retry-count: 10
    ttl-days: 7
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    topics:
      events: tracker-events
      events-dlq: tracker-events-dlq
      sessions: tracker-sessions
    partitions:
      events: 12
      sessions: 6
    consumer:
      concurrency: 3
      batch-enabled: true
  rate-limit:
    max-per-second: 10000
    burst: 20000
  clickhouse:
    url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/gateflow_tracker}
    user: ${CLICKHOUSE_USER:victor}
    password: ${CLICKHOUSE_PASSWORD:victor123}

spring:
  application:
    name: tracker-service

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 50
        max-idle: 20
        min-idle: 5
        max-wait: 3000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 5
      properties:
        enable.idempotence: true
        compression.type: lz4
    consumer:
      group-id: tracker-consumer-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100

resilience4j:
  circuitbreaker:
    instances:
      clickhouse:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.gateflow.tracker: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
